<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎙️ 智能指令音訊隨機播放器 (RWD 分離版)</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* 拖曳時的虛線與過渡樣式 */
        .dragging { 
            opacity: 0.4; 
            background-color: #1e293b !important; 
            border: 2px dashed #3b82f6 !important; 
        }
        /* 隱藏數字輸入框的微調箭頭 */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="bg-slate-950 min-h-screen antialiased text-slate-200 py-6 px-3 sm:py-10 sm:px-4">

    <div class="max-w-3xl mx-auto space-y-6">
        
        <header class="text-center space-y-1">
            <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight text-white flex items-center justify-center gap-2">
                <span class="material-icons-round text-blue-500 text-2xl sm:text-3xl">record_voice_over</span> 智能指令播放器
            </h1>
            <p class="text-xs sm:text-sm text-slate-400">自訂指令、權重比例，打造專屬的節奏訓練助手</p>
        </header>

        <main class="space-y-6">
            
            <section class="bg-slate-900 rounded-2xl shadow-xl border border-slate-800/80 p-4 sm:p-6 space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-base sm:text-lg font-bold text-white flex items-center gap-2">
                        <span class="material-icons-round text-slate-500">format_list_numbered</span> 1. 訓練指令清單
                    </h2>
                    <span class="text-[10px] sm:text-xs bg-slate-800 text-slate-300 px-2.5 py-1 rounded-full font-medium border border-slate-700/50">
                        按住指令任一處即可拖曳排序
                    </span>
                </div>

                <div class="space-y-2" id="commandList">
                    </div>

                <div class="bg-slate-950/60 p-3 rounded-xl border border-slate-800 flex flex-col sm:flex-row gap-3 items-stretch sm:items-center">
                    <div class="flex items-center gap-3 flex-1">
                        <div class="w-6 text-center text-slate-500 font-bold text-xs select-none" id="nextIndex">#1</div>
                        <div class="flex-1 relative">
                            <span class="material-icons-round text-slate-500 absolute left-3 top-2.5 text-sm">fitness_center</span>
                            <input type="text" id="cmdText" placeholder="輸入新指令 (如：左直拳)" 
                                   class="w-full pl-9 pr-3 py-2 text-sm bg-slate-900 border border-slate-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 text-slate-100 placeholder-slate-500 font-semibold transition">
                        </div>
                    </div>
                    
                    <div class="flex gap-3 items-center justify-between sm:justify-end">
                        <div class="w-28 relative">
                            <span class="material-icons-round text-slate-500 absolute left-2.5 top-2.5 text-sm">scale</span>
                            <input type="number" id="cmdWeight" placeholder="權重" value="10" min="1" max="100" 
                                   class="w-full pl-8 pr-2 py-2 text-sm text-center bg-slate-900 border border-slate-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 text-slate-100 font-semibold transition">
                        </div>

                        <button onclick="addCommand()" class="flex-1 sm:flex-none bg-blue-600 hover:bg-blue-500 active:scale-[0.98] text-white px-4 py-2 rounded-lg text-sm font-semibold transition flex items-center justify-center gap-1 shadow-md shadow-blue-900/20">
                            <span class="material-icons-round text-sm">add</span> 新增
                        </button>
                    </div>
                </div>
            </section>

            <section class="bg-slate-900 rounded-2xl shadow-xl border border-slate-800/80 p-4 sm:p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-300 flex items-center gap-1.5">
                        <span class="material-icons-round text-slate-500 text-lg">shuffle</span> 播放模式
                    </label>
                    <div class="space-y-2 pt-1">
                        <label class="flex items-center gap-3 p-2.5 bg-slate-950/40 border border-slate-800 rounded-xl cursor-pointer hover:bg-slate-800/50 transition">
                            <input type="radio" name="playMode" value="sequence" checked class="w-4 h-4 text-blue-500 border-slate-700 bg-slate-900 focus:ring-blue-500">
                            <div class="text-xs">
                                <p class="font-semibold text-slate-200">模式一：順序循環</p>
                                <p class="text-slate-500">依序號輪流播放</p>
                            </div>
                        </label>
                        <label class="flex items-center gap-3 p-2.5 bg-slate-950/40 border border-slate-800 rounded-xl cursor-pointer hover:bg-slate-800/50 transition">
                            <input type="radio" name="playMode" value="random" class="w-4 h-4 text-blue-500 border-slate-700 bg-slate-900 focus:ring-blue-500">
                            <div class="text-xs">
                                <p class="font-semibold text-slate-200">模式二：隨機機率</p>
                                <p class="text-slate-500">依權重比例抽選</p>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="space-y-2 border-t md:border-t-0 md:border-x border-slate-800 md:px-6 pt-4 md:pt-0">
                    <label class="text-sm font-bold text-slate-300 flex items-center gap-1.5">
                        <span class="material-icons-round text-slate-500 text-lg">timer</span> 語音間隔時間
                    </label>
                    <div class="flex gap-4 pt-1 mb-2">
                        <label class="flex items-center gap-1.5 text-xs font-medium text-slate-400 cursor-pointer">
                            <input type="radio" name="timeMode" value="fixed" checked onchange="toggleTimeInputs()" class="text-blue-500 bg-slate-900"> 固定
                        </label>
                        <label class="flex items-center gap-1.5 text-xs font-medium text-slate-400 cursor-pointer">
                            <input type="radio" name="timeMode" value="random" onchange="toggleTimeInputs()" class="text-blue-500 bg-slate-900"> 隨機範圍
                        </label>
                    </div>

                    <div id="fixedTimeInput" class="flex items-center gap-2 text-xs bg-slate-950/40 p-3 rounded-xl border border-slate-800">
                        <span class="text-slate-400">每隔</span>
                        <input type="number" id="fixedSeconds" value="3" min="0.5" step="0.5" class="w-16 p-1 text-center bg-slate-900 border border-slate-800 rounded-md font-semibold text-blue-400 focus:outline-none focus:border-blue-500">
                        <span class="text-slate-400">秒播放一次</span>
                    </div>

                    <div id="randomTimeInput" class="hidden flex items-center gap-1.5 text-xs bg-slate-950/40 p-3 rounded-xl border border-slate-800">
                        <input type="number" id="minSeconds" value="1" min="0.5" step="0.5" class="w-14 p-1 text-center bg-slate-900 border border-slate-800 rounded-md font-semibold text-blue-400 focus:outline-none focus:border-blue-500">
                        <span class="text-slate-400">至</span>
                        <input type="number" id="maxSeconds" value="5" min="0.5" step="0.5" class="w-14 p-1 text-center bg-slate-900 border border-slate-800 rounded-md font-semibold text-blue-400 focus:outline-none focus:border-blue-500">
                        <span class="text-slate-400">秒之間隨機</span>
                    </div>
                </div>

                <div class="space-y-2 border-t md:border-t-0 border-slate-800 pt-4 md:pt-0">
                    <label class="text-sm font-bold text-slate-300 flex items-center gap-1.5">
                        <span class="material-icons-round text-slate-500 text-lg">hourglass_top</span> 訓練總時長
                    </label>
                    <p class="text-xs text-slate-500 pt-1">設定本次訓練的倒數總時間</p>
                    <div class="flex items-center gap-2 bg-slate-950/40 p-3 rounded-xl border border-slate-800 text-xs">
                        <input type="number" id="durationMin" value="3" min="0" max="60" class="w-14 p-1 text-center bg-slate-900 border border-slate-800 rounded-md font-semibold text-slate-200 focus:outline-none focus:border-blue-500">
                        <span class="text-slate-500">分</span>
                        <input type="number" id="durationSec" value="0" min="0" max="59" class="w-14 p-1 text-center bg-slate-900 border border-slate-800 rounded-md font-semibold text-slate-200 focus:outline-none focus:border-blue-500">
                        <span class="text-slate-500">秒</span>
                    </div>
                </div>
            </section>

            <section class="bg-slate-900 text-white rounded-2xl shadow-2xl border border-slate-800 p-4 sm:p-6 space-y-6" id="dashboardPanel">
                <div class="flex flex-col sm:flex-row justify-between items-center gap-4 pb-4 border-b border-slate-800">
                    <div class="flex items-center gap-3 text-center sm:text-left">
                        <div class="w-3 h-3 rounded-full bg-slate-600" id="statusDot"></div>
                        <div id="statusDisplay" class="text-base sm:text-lg font-bold tracking-wide text-slate-400">狀態：準備就緒</div>
                    </div>
                    <div id="countdownContainer" class="text-2xl font-black font-mono tracking-wider bg-slate-950 px-4 py-1.5 rounded-xl border border-slate-800 text-slate-400">
                        03:00
                    </div>
                </div>

                <div class="flex gap-4">
                    <button id="startBtn" onclick="startPlayback()" class="flex-1 bg-blue-600 hover:bg-blue-500 active:scale-[0.99] text-white font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-blue-900/30 transition flex items-center justify-center gap-2 text-base sm:text-lg">
                        <span class="material-icons-round text-xl sm:text-2xl">play_arrow</span> 開始訓練
                    </button>
                    <button id="stopBtn" onclick="stopPlayback()" disabled class="flex-1 bg-slate-950 text-slate-600 font-bold py-3.5 px-4 rounded-xl transition flex items-center justify-center gap-2 text-base sm:text-lg cursor-not-allowed border border-slate-900">
                        <span class="material-icons-round text-xl sm:text-2xl">stop</span> 停止
                    </button>
                </div>
            </section>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
